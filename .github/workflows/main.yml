name: RDP-Static

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 350

    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP-Static" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Create RDP User
        run: |
          $user = '${{ secrets.RDP_USER }}'
          $pass = '${{ secrets.RDP_PASSWORD }}'
          $securePass = ConvertTo-SecureString $pass -AsPlainText -Force
          New-LocalUser -Name $user -Password $securePass -AccountNeverExpires -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member $user -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $user -ErrorAction SilentlyContinue

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait

      - name: Establish Tailscale Connection
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=${{ secrets.TS_HOSTNAME }} --accept-routes
          $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          echo "::add-mask::$tsIP"
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Install Python Dependencies
        run: pip install requests

      - name: Restore Files from Telegram
        run: |
          $script = @'
          import requests, os
          TOKEN = "${{ secrets.TELEGRAM_TOKEN }}"
          CHAT_ID = "${{ secrets.TELEGRAM_CHAT_ID }}"
          DEST = os.path.join(os.environ.get("USERPROFILE", "C:\\Users\\runneradmin"), "Downloads")

          def get_latest_files():
              url = f"https://api.telegram.org/bot{TOKEN}/getUpdates"
              try:
                  r = requests.get(url).json()
                  if not r.get("ok"): return
                  # Pega as últimas 5 mensagens para garantir que não perdeu nada
                  for result in reversed(r.get("result", [])):
                      msg = result.get("message", {})
                      if "document" in msg:
                          file_id = msg["document"]["file_id"]
                          file_name = msg["document"]["file_name"]
                          # Busca o link do arquivo
                          f_info = requests.get(f"https://api.telegram.org/bot{TOKEN}/getFile?file_id={file_id}").json()
                          f_path = f_info["result"]["file_path"]
                          download_url = f"https://api.telegram.org/file/bot{TOKEN}/{f_path}"
                          
                          with requests.get(download_url, stream=True) as dl:
                              with open(os.path.join(DEST, file_name), "wb") as f:
                                  for chunk in dl.iter_content(chunk_size=8192): f.write(chunk)
                  print("✅ Restauração concluída.")
              except Exception as e: print(f"Erro no restore: {e}")

          if not os.path.exists(DEST): os.makedirs(DEST)
          get_latest_files()
          '@
          $script | Out-File -FilePath "C:\restore.py" -Encoding UTF8
          python "C:\restore.py"

      - name: Start Telegram Backup Monitor (Silent)
        run: |
          $script = @'
          import os, requests, time, json
          from pathlib import Path

          TOKEN = "${{ secrets.TELEGRAM_TOKEN }}"
          CHAT_ID = "${{ secrets.TELEGRAM_CHAT_ID }}"
          WATCH = [ "C:\\Users", os.path.join(os.environ.get("USERPROFILE", "C:\\Users\\runneradmin"), "Downloads") ]
          SENT_LOG = "C:\\sent_files.json"
          IGNORE_EXT = {".tmp",".log",".lnk",".ini",".db",".sys",".dll",".mui",".pf",".etl"}
          IGNORE_DIRS = {"Windows","Program Files","ProgramData","AppData\\Local\\Temp"}
          MAX_BYTES = 1900 * 1024 * 1024

          def load_sent():
              try:
                  with open(SENT_LOG) as f: return json.load(f)
              except: return {}

          def save_sent(data):
              with open(SENT_LOG, "w") as f: json.dump(data, f)

          def send_file(path):
              size = os.path.getsize(path)
              if size == 0 or size > MAX_BYTES: return False
              try:
                  with open(path, "rb") as f:
                      requests.post(f"https://api.telegram.org/bot{TOKEN}/sendDocument",
                          data={"chat_id": CHAT_ID, "caption": f"📦 {os.path.basename(path)}"},
                          files={"document": f}, timeout=300)
                  return True
              except: return False

          start_time = time.time()
          sent = load_sent()
          while True:
              for watch_root in WATCH:
                  if not os.path.exists(watch_root): continue
                  for root, dirs, files in os.walk(watch_root):
                      dirs[:] = [d for d in dirs if not any(ig in os.path.join(root, d) for ig in IGNORE_DIRS)]
                      for fname in files:
                          if Path(fname).suffix.lower() in IGNORE_EXT: continue
                          fpath = os.path.join(root, fname)
                          try:
                              if os.path.getmtime(fpath) > start_time and fpath not in sent:
                                  if send_file(fpath):
                                      sent[fpath] = time.time()
                                      save_sent(sent)
                          except: pass
              time.sleep(30)
          '@
          $script | Out-File -FilePath "C:\backup_monitor.py" -Encoding UTF8
          Start-Process python -ArgumentList "C:\backup_monitor.py" -WindowStyle Hidden

      - name: Maintain Connection
        run: |
          Write-Host "Runner Online. Sistema ativo."
          while ($true) { Start-Sleep -Seconds 300 }
