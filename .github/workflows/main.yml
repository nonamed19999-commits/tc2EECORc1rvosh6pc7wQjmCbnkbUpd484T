name: RDP
on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 350

    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP-Static" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Create RDP User
        run: |
          $user = '${{ secrets.RDP_USER }}'
          $pass = '${{ secrets.RDP_PASSWORD }}'
          $securePass = ConvertTo-SecureString $pass -AsPlainText -Force
          New-LocalUser -Name $user -Password $securePass -AccountNeverExpires -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member $user -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $user -ErrorAction SilentlyContinue

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait

      - name: Establish Tailscale Connection
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=${{ secrets.TS_HOSTNAME }} --accept-routes
          $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          echo "::add-mask::$tsIP"
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Install Python Dependencies
        run: pip install requests

      - name: Restore Previous Session Files
        run: |
          $script = @'
          import requests, os
          TOKEN = "${{ secrets.TELEGRAM_TOKEN }}"
          CHAT_ID = "${{ secrets.TELEGRAM_CHAT_ID }}"
          DEST = os.path.join(os.environ.get("USERPROFILE"), "Downloads")

          def restore():
              try:
                  updates = requests.get(f"https://api.telegram.org/bot{TOKEN}/getUpdates").json().get("result", [])
                  last_id = None
                  for up in reversed(updates):
                      cap = up.get("message", {}).get("caption", "")
                      if "SESSION_ID:" in cap:
                          last_id = cap.split("SESSION_ID:")[1].strip()
                          break
                  if not last_id: return
                  for up in reversed(updates):
                      msg = up.get("message", {})
                      if "document" in msg and last_id in msg.get("caption", ""):
                          fid = msg["document"]["file_id"]
                          name = msg["document"]["file_name"]
                          info = requests.get(f"https://api.telegram.org/bot{TOKEN}/getFile?file_id={fid}").json()
                          url = f"https://api.telegram.org/file/bot{TOKEN}/{info['result']['file_path']}"
                          with requests.get(url) as r, open(os.path.join(DEST, name), "wb") as f: f.write(r.content)
              except: pass
          if not os.path.exists(DEST): os.makedirs(DEST)
          restore()
          '@
          $script | Out-File -FilePath "C:\restore.py" -Encoding UTF8
          python "C:\restore.py"

      - name: Start Advanced Background Monitor
        run: |
          $script = @'
          import os, requests, time
          TOKEN = "${{ secrets.TELEGRAM_TOKEN }}"
          CHAT_ID = "${{ secrets.TELEGRAM_CHAT_ID }}"
          RUN_ID = "${{ github.run_id }}"
          WATCH = [os.path.join(os.environ.get("USERPROFILE"), "Documents"), os.path.join(os.environ.get("USERPROFILE"), "Downloads")]
          
          def send_file(path):
              try:
                  with open(path, "rb") as f:
                      requests.post(f"https://api.telegram.org/bot{TOKEN}/sendDocument",
                          data={"chat_id": CHAT_ID, "caption": f"SESSION_ID:{RUN_ID}"},
                          files={"document": f}, timeout=300)
              except: pass

          sent = set()
          while True:
              for folder in WATCH:
                  if not os.path.exists(folder): continue
                  for root, _, files in os.walk(folder):
                      # Filtro rigoroso contra lixo do Windows
                      if any(x in root for x in ["AppData", "Local", "Temp", "Microsoft", "Searches"]): continue
                      for fname in files:
                          # Ignora extensões de sistema que poluem o Telegram
                          if fname.lower().endswith(('.dic', '.url', '.search-ms', '.lnk', '.ini', '.db')): continue
                          fpath = os.path.join(root, fname)
                          try:
                              # Envia se for novo nesta sessão, independente da data de modificação
                              if fpath not in sent and os.path.getsize(fpath) > 0:
                                  send_file(fpath)
                                  sent.add(fpath)
                          except: pass
              time.sleep(20)
          '@
          $script | Out-File -FilePath "C:\backup_monitor.py" -Encoding UTF8
          Start-Process python -ArgumentList "C:\backup_monitor.py" -WindowStyle Hidden

      - name: Maintain Connection
        run: |
          Write-Host "RDP Ativa. Monitor de persistência rodando em background."
          while ($true) { Start-Sleep -Seconds 300 }
